<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biodata — Aditya Kurniawan</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --biru:     #1A3A5C;
      --biru2:    #2563EB;
      --biru3:    #DBEAFE;
      --emas:     #F59E0B;
      --putih:    #FFFFFF;
      --abu:      #64748B;
      --terang:   #F8FAFC;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0F2236 0%, #1A3A5C 50%, #0F2236 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }

    .kartu {
      background: var(--putih);
      border-radius: 24px;
      width: 100%; max-width: 440px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4);
    }

    /* Header strip */
    .strip {
      height: 10px;
      background: linear-gradient(90deg, var(--biru2), var(--emas));
    }

    /* Foto area */
    .foto-area {
      background: linear-gradient(160deg, #1A3A5C 0%, #2563EB 100%);
      padding: 2.5rem 2rem 1.5rem;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    .foto-wrap {
      width: 130px; height: 130px;
      border-radius: 50%;
      border: 4px solid var(--emas);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      margin-bottom: 1.2rem;
    }
    .foto-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top;
    }
    .nama {
      font-family: 'Syne', sans-serif;
      font-size: 1.45rem; font-weight: 800;
      color: #fff; letter-spacing: -0.01em;
      text-align: center; margin-bottom: 4px;
    }
    .prodi-tag {
      background: rgba(245,158,11,0.2);
      border: 1px solid rgba(245,158,11,0.5);
      color: var(--emas);
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 14px; border-radius: 20px;
    }

    /* Info baris */
    .info-area {
      padding: 1.8rem 2rem 2rem;
      display: flex; flex-direction: column; gap: 1px;
    }
    .baris {
      display: flex; align-items: center;
      padding: 0.9rem 1.1rem;
      border-radius: 12px;
      transition: background .15s;
    }
    .baris:hover { background: var(--terang); }
    .baris-ikon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: var(--biru3);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; margin-right: 1rem; flex-shrink: 0;
    }
    .baris-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--abu); margin-bottom: 2px;
    }
    .baris-val {
      font-size: 0.95rem; font-weight: 600; color: var(--biru);
    }
    .divider {
      border: none; border-top: 1px solid #EEF2F7;
      margin: 0.2rem 1.1rem;
    }

    /* Footer */
    .kartu-footer {
      background: var(--terang);
      border-top: 1px solid #EEF2F7;
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 0.72rem; color: var(--abu);
    }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--emas); }
  </style>
</head>
